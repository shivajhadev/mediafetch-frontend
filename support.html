<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — MediaFetch</title>
  <meta name="description" content="Get help with MediaFetch. Contact our team via the support form or email us directly at info.shiyos@gmail.com." />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />

  <style>
    body { position: relative; overflow-x: hidden; }

    /* ── Ambient Bg ─────────────────────────────────────────────────── */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .ambient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.06;
    }
    .blob-1 {
      width: 55vw; height: 55vw; max-width: 700px; max-height: 700px;
      background: var(--primary);
      top: -15%; left: -15%;
    }
    .blob-2 {
      width: 45vw; height: 45vw; max-width: 600px; max-height: 600px;
      background: var(--tertiary);
      bottom: -10%; right: -10%;
    }

    main {
      flex: 1; position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 8rem 1.5rem 5rem;
    }

    /* ── Hero ──────────────────────────────────────────────────────── */
    .support-hero { text-align: center; margin-bottom: 3rem; }
    .support-hero h1 {
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 900; letter-spacing: -0.04em;
      color: var(--on-surface); line-height: 1;
      margin-bottom: 0.75rem;
    }
    .support-hero p {
      font-size: 1.1rem; color: var(--on-surface-variant);
    }

    /* ── Support Card ────────────────────────────────────────────────── */
    .support-card {
      width: 100%; max-width: 36rem;
      background: var(--glass-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    /* ── Form ────────────────────────────────────────────────────────── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 0.78rem; font-weight: 600;
      color: var(--on-surface-variant);
    }
    .form-group input,
    .form-group textarea {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border: 1px solid var(--outline-variant);
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      color: var(--on-surface);
      font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(169,171,179,0.45);
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(158,255,200,0.1);
    }
    .form-group textarea { resize: none; min-height: 7.5rem; line-height: 1.6; }

    /* ── Support Form submit btn ──────────────────────────────────────── */
    .support-submit-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      width: 100%;
      padding: 1rem;
      border-radius: 9999px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      color: #003840;
      font-family: 'Manrope', sans-serif;
      font-weight: 900; font-size: 1rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
      margin-top: 0.5rem;
    }
    .support-submit-btn:hover { box-shadow: 0 0 26px rgba(0,172,253,0.35); }
    .support-submit-btn:active { transform: scale(0.97); }
    .support-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Divider + Direct Email ───────────────────────────────────────── */
    .support-card-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .support-card-footer p { font-size: 0.82rem; color: var(--on-surface-variant); margin-bottom: 0.5rem; }
    .support-card-footer a {
      font-family: 'Manrope', sans-serif;
      font-size: 1rem; font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .support-card-footer a:hover { color: var(--primary-dim); }

    /* ── Quick Links ────────────────────────────────────────────────── */
    .quick-links {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
      max-width: 36rem;
      width: 100%;
    }
    .quick-link {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--surface-container);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 9999px;
      color: var(--on-surface-variant);
      font-size: 0.8rem; font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .quick-link:hover {
      background: var(--surface-highest);
      color: var(--on-surface);
      transform: translateY(-2px);
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .support-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- Ambient background -->
<div class="ambient" aria-hidden="true">
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>
</div>

<!-- Toast Container -->
<div id="toast-container" aria-live="polite"></div>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<header>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">MediaFetch</a>
      <ul class="navbar-links">
        <li><a href="index.html">Downloader</a></li>
        <li><a href="premium.html">Premium</a></li>
        <li><a href="support.html" class="active">Support</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
          <span class="material-symbols-outlined">light_mode</span>
        </button>
      </div>
    </div>
  </nav>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main>

  <div class="support-hero">
    <h1>Support</h1>
    <p>Need help? We're here for you.</p>
  </div>

  <!-- Support Card -->
  <div class="support-card">
    <form id="support-form" novalidate>
      <div class="form-row" style="margin-bottom:1rem">
        <div class="form-group">
          <label for="support-name">Name <span style="color:var(--on-surface-variant);font-weight:400">(optional)</span></label>
          <input id="support-name" type="text" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="support-email">Email <span style="color:var(--error)">*</span></label>
          <input id="support-email" type="email" placeholder="hello@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group full" style="margin-bottom:1.25rem">
        <label for="support-message">Message <span style="color:var(--error)">*</span></label>
        <textarea id="support-message" placeholder="How can we assist you today?" required></textarea>
      </div>
      <button class="support-submit-btn" id="support-submit-btn" type="submit">
        <span class="hidden spinner" id="support-submit-spinner"></span>
        <span id="support-submit-label">Send Message</span>
        <span class="material-symbols-outlined icon-filled" style="font-size:1rem">send</span>
      </button>
    </form>

    <div class="support-card-footer">
      <p>Or contact us directly</p>
      <a href="mailto:info.shiyos@gmail.com">info.shiyos@gmail.com</a>
    </div>
  </div>

  <!-- Quick Links -->
  <div class="quick-links">
    <a href="index.html" class="quick-link">
      <span class="material-symbols-outlined" style="font-size:0.9rem">download</span>
      Try the Downloader
    </a>
    <a href="premium.html" class="quick-link">
      <span class="material-symbols-outlined" style="font-size:0.9rem">star</span>
      View Premium Plans
    </a>
    <a href="mailto:info.shiyos@gmail.com" class="quick-link">
      <span class="material-symbols-outlined" style="font-size:0.9rem">mail</span>
      Email Us
    </a>
  </div>

</main>

<!-- ── Footer ──────────────────────────────────────────────────────────────── -->
<footer class="footer" style="position:relative;z-index:1">
  <div class="footer-inner">
    <span class="footer-logo">MediaFetch</span>
    <span class="footer-copy">© 2024 MediaFetch. The Digital Curator.</span>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="support.html">Support</a>
    </div>
  </div>
</footer>

<script src="js/theme.js"></script>
<script src="js/support.js"></script>
</body>
</html>
